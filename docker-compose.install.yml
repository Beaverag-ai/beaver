services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
    - 5491:5432
    environment:
    - POSTGRES_USER=beaver
    - POSTGRES_PASSWORD=beaver
    - POSTGRES_DB=beaver
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U beaver -d beaver
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    ports:
    - 11491:11434
    volumes:
    - ollama_data:/root/.ollama
    restart: unless-stopped
  sglang:
    image: lmsysorg/sglang:latest
    ports:
    - 30091:30000
    volumes:
    - sglang_cache:/root/.cache/huggingface
    command: python3 -m sglang.launch_server --model-path Qwen/Qwen3.5-35B-A3B-FP8
      --host 0.0.0.0 --port 30000 --tool-call-parser qwen25 --reasoning-parser qwen3
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    ipc: host
    restart: unless-stopped
  telegram-bot:
    build:
      context: .
      dockerfile: docker/telegram-bot.Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    - BEAVER_API_URL=http://api:8741
    - BEAVER_API_KEY=${BEAVER_API_KEY}
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
    - 8741:8741
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
    - API_HOST=0.0.0.0
    - API_PORT=8741
    - DATABASE_URL=postgresql+asyncpg://beaver:beaver@postgres:5432/beaver
    - SGLANG_URL=http://sglang:30000
    - OLLAMA_URL=http://ollama:11434
    - DEBUG=false
    - EMBEDDING_MODEL=nomic-embed-text
    - EMBEDDING_DIM=768
    volumes:
    - ./uploads:/app/uploads
    restart: unless-stopped
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
    - DATABASE_URL=postgresql+asyncpg://beaver:beaver@postgres:5432/beaver
    - OLLAMA_URL=http://ollama:11434
    - EMBEDDING_MODEL=nomic-embed-text
    - EMBEDDING_DIM=768
    volumes:
    - ./uploads:/app/uploads
    restart: unless-stopped
volumes:
  postgres_data: null
  ollama_data: null
  sglang_cache: null
